<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-101 机械臂控制界面</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    
    <style>
        .joint-card {
            transition: all 0.3s ease;
            border-left: 4px solid #007bff;
        }
        
        .joint-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            font-weight: bold;
            color: #007bff;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-connected {
            background-color: #28a745;
            animation: pulse 2s infinite;
        }
        
        .status-disconnected {
            background-color: #dc3545;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .control-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .info-panel {
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        
        .joint-name {
            color: #495057;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .range-input {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-transition: .2s;
            transition: opacity .2s;
        }
        
        .range-input:hover {
            opacity: 1;
        }
        
        .range-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
        }
        
        .range-input::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
        }
        
        .emergency-stop {
            background: linear-gradient(45deg, #dc3545, #c82333);
            border: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .emergency-stop:hover {
            background: linear-gradient(45deg, #c82333, #bd2130);
            transform: scale(1.05);
        }
        
        .log-area {
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            background: #1e1e1e;
            color: #00ff00;
            border-radius: 5px;
            padding: 10px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container-fluid py-4">
        
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="display-4 text-center mb-0">
                    <i class="bi bi-robot"></i> SO-101 机械臂控制中心
                </h1>
                <p class="text-center text-muted">Web-based Robotic Arm Control Interface</p>
            </div>
        </div>
        
        <!-- Control Panel -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="control-panel">
                    <div class="row align-items-center">
                        <div class="col-md-6">
                            <h4 class="mb-3">
                                <i class="bi bi-plug"></i> 连接控制
                            </h4>
                            <div class="btn-group" role="group">
                                <button id="connectBtn" class="btn btn-success btn-lg">
                                    <i class="bi bi-power"></i> 连接机械臂
                                </button>
                                <button id="disconnectBtn" class="btn btn-danger btn-lg">
                                    <i class="bi bi-stop-circle"></i> 断开连接
                                </button>
                            </div>
                        </div>
                        
                        <div class="col-md-6 text-md-end">
                            <h5 class="mb-2">
                                <i class="bi bi-info-circle"></i> 状态信息
                            </h5>
                            <div class="d-flex align-items-center justify-content-md-end">
                                <span id="statusIndicator" class="status-indicator status-disconnected"></span>
                                <span id="statusText" class="badge bg-secondary fs-6">未连接</span>
                            </div>
                            <div class="mt-2">
                                <small>机器人类型: <span id="robotType">未知</span></small>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Emergency Stop -->
                    <div class="row mt-3">
                        <div class="col-12 text-center">
                            <button id="emergencyStop" class="btn emergency-stop btn-lg px-5">
                                <i class="bi bi-exclamation-triangle"></i> 紧急停止
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Joint Controls -->
        <div class="row mb-4">
            <div class="col-12">
                <h3 class="mb-3">
                    <i class="bi bi-sliders"></i> 关节控制
                    <small class="text-muted">Joint Position Control</small>
                </h3>
                <div id="jointControls" class="row g-3">
                    <!-- 动态生成关节控制器 -->
                    <div class="col-12 text-center text-muted">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-2">请先连接机械臂以加载关节控制器</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Information Panels -->
        <div class="row">
            <!-- Current Status -->
            <div class="col-md-6 mb-4">
                <div class="info-panel p-4">
                    <h4 class="mb-3">
                        <i class="bi bi-graph-up"></i> 实时状态
                        <small class="text-muted">Real-time Status</small>
                    </h4>
                    <div class="row">
                        <div class="col-12">
                            <h6>当前关节位置:</h6>
                            <pre id="currentPositions" class="bg-dark text-light p-3 rounded">{
  "status": "未连接"
}</pre>
                        </div>
                    </div>
                    
                    <div class="mt-3">
                        <small class="text-muted">
                            更新频率: <span id="updateRate">-- Hz</span> | 
                            最后更新: <span id="lastUpdate">--</span>
                        </small>
                    </div>
                </div>
            </div>
            
            <!-- System Log -->
            <div class="col-md-6 mb-4">
                <div class="info-panel p-4">
                    <h4 class="mb-3">
                        <i class="bi bi-terminal"></i> 系统日志
                        <small class="text-muted">System Log</small>
                    </h4>
                    <div class="log-area" id="systemLog">
                        <div>[INFO] Web控制界面已启动</div>
                        <div>[INFO] 等待连接机械臂...</div>
                    </div>
                    <div class="mt-2">
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearLog()">
                            <i class="bi bi-trash"></i> 清除日志
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main JavaScript -->
    <script>
        // Global variables
        const socket = io();
        let joints = [];
        let isConnected = false;
        let updateCounter = 0;
        let jointRanges = {}; // Store joint ranges globally
        let lastUpdateTime = Date.now();
        
        // Joint name mapping for display
        const jointDisplayNames = {
            'shoulder_pan.pos': '肩部旋转',
            'shoulder_lift.pos': '肩部抬升', 
            'elbow_flex.pos': '肘部弯曲',
            'wrist_flex.pos': '腕部弯曲',
            'wrist_roll.pos': '腕部旋转',
            'gripper.pos': '夹爪'
        };
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            setupWebSocket();
            loadInitialStatus();
            logMessage('Web界面初始化完成');
        });
        
        function setupEventListeners() {
            // Connection buttons
            document.getElementById('connectBtn').onclick = connectRobot;
            document.getElementById('disconnectBtn').onclick = disconnectRobot;
            document.getElementById('emergencyStop').onclick = emergencyStop;
        }
        
        function setupWebSocket() {
            socket.on('connect', function() {
                logMessage('WebSocket连接已建立');
            });
            
            socket.on('disconnect', function() {
                logMessage('WebSocket连接已断开');
            });
            
            socket.on('robot_status', function(data) {
                updateRealTimeStatus(data);
            });
            
            socket.on('status', function(data) {
                logMessage('[WEBSOCKET] ' + data.message);
            });
        }
        
        async function loadInitialStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateConnectionStatus(data.connected);
                
                if (data.connected) {
                    jointRanges = data.joint_ranges || {}; // Store globally
                    createJointControls(data.joints, data.joint_ranges);
                    updateCurrentPositions(data.current_positions);
                    document.getElementById('robotType').textContent = data.robot_type || 'SO-101';
                }
            } catch (error) {
                logMessage('[ERROR] 加载初始状态失败: ' + error.message);
            }
        }
        
        async function connectRobot() {
            const btn = document.getElementById('connectBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 连接中...';
            
            try {
                logMessage('[INFO] 正在连接机械臂...');
                const response = await fetch('/api/connect', {method: 'POST'});
                const result = await response.json();
                
                logMessage(`[${result.status.toUpperCase()}] ${result.message}`);
                
                if (result.status === 'success') {
                    updateConnectionStatus(true);
                    await loadJointControls();
                    document.getElementById('robotType').textContent = result.robot_type || 'SO-101';
                }
            } catch (error) {
                logMessage('[ERROR] 连接失败: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
        
        async function disconnectRobot() {
            const btn = document.getElementById('disconnectBtn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 断开中...';
            
            try {
                logMessage('[INFO] 正在断开机械臂连接...');
                const response = await fetch('/api/disconnect', {method: 'POST'});
                const result = await response.json();
                
                logMessage(`[${result.status.toUpperCase()}] ${result.message}`);
                updateConnectionStatus(false);
                clearJointControls();
                document.getElementById('robotType').textContent = '未知';
            } catch (error) {
                logMessage('[ERROR] 断开连接时出错: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
        
        async function loadJointControls() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                if (data.connected && data.joints) {
                    joints = data.joints;
                    jointRanges = data.joint_ranges || {}; // Store globally
                    createJointControls(data.joints, data.joint_ranges);
                    updateCurrentPositions(data.current_positions);
                    logMessage(`[INFO] 加载了 ${data.joints.length} 个关节控制器`);
                }
            } catch (error) {
                logMessage('[ERROR] 加载关节控制器失败: ' + error.message);
            }
        }
        
        function createJointControls(jointNames, jointRanges = {}) {
            const container = document.getElementById('jointControls');
            container.innerHTML = '';
            
            jointNames.forEach(joint => {
                const jointName = joint.replace('.pos', '');
                const displayName = jointDisplayNames[joint] || jointName;
                const range = jointRanges[joint] || {min: -1, max: 1, center: 0};
                const step = 1; // 1 degree steps
                
                const col = document.createElement('div');
                col.className = 'col-lg-4 col-md-6';
                col.innerHTML = `
                    <div class="card joint-card h-100">
                        <div class="card-body">
                            <h6 class="card-title joint-name">${displayName}</h6>
                            <p class="card-text text-muted small">${joint}</p>
                            <p class="card-text text-info small">范围: ${range.min}° ~ ${range.max}°</p>
                            
                            <div class="mb-3">
                                <input type="range" class="form-range range-input" id="slider_${joint}" 
                                       min="${range.min}" max="${range.max}" step="${step}" value="${range.center}">
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center">
                                <small class="text-muted">${range.min}°</small>
                                <span class="value-display" id="value_${joint}">${range.center}°</span>
                                <small class="text-muted">${range.max}°</small>
                            </div>
                            
                            <div class="mt-2">
                                <button class="btn btn-sm btn-outline-primary" onclick="resetJoint('${joint}')">
                                    <i class="bi bi-arrow-counterclockwise"></i> 复位
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(col);
                
                // 添加滑动条事件
                const slider = document.getElementById(`slider_${joint}`);
                const valueDisplay = document.getElementById(`value_${joint}`);
                
                slider.oninput = function() {
                    valueDisplay.textContent = this.value + '°';
                };

                slider.onchange = function() {
                    if (isConnected) {
                        sendJointCommand(joint, parseFloat(this.value));
                    }
                };
            });
        }
        
        function clearJointControls() {
            const container = document.getElementById('jointControls');
            container.innerHTML = `
                <div class="col-12 text-center text-muted">
                    <i class="bi bi-robot" style="font-size: 3em; opacity: 0.3;"></i>
                    <p class="mt-2">机械臂已断开连接</p>
                </div>
            `;
        }
        
        async function sendJointCommand(joint, value) {
            try {
                const action = {};
                action[joint] = value;
                
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(action)
                });
                
                const result = await response.json();
                
                if (result.status === 'error') {
                    logMessage(`[ERROR] 关节控制失败: ${result.message}`);
                } else {
                    logMessage(`[INFO] 关节 ${joint} 设置为 ${value.toFixed(2)}`);
                }
            } catch (error) {
                logMessage(`[ERROR] 发送关节命令失败: ${error.message}`);
            }
        }
        
        function resetJoint(joint) {
            const slider = document.getElementById(`slider_${joint}`);
            const valueDisplay = document.getElementById(`value_${joint}`);
            
            // Get the center value for this joint
            const range = jointRanges[joint] || {center: 0};
            const centerValue = range.center;
            
            slider.value = centerValue;
            valueDisplay.textContent = centerValue;
            
            if (isConnected) {
                sendJointCommand(joint, centerValue);
            }
        }
        
        function emergencyStop() {
            if (!isConnected) {
                logMessage('[WARNING] 机械臂未连接，无法执行紧急停止');
                return;
            }
            
            logMessage('[EMERGENCY] 执行紧急停止！');
            
            // Reset all joints to 0
            const action = {};
            joints.forEach(joint => {
                action[joint] = 0;
                
                // Reset sliders
                const slider = document.getElementById(`slider_${joint}`);
                const valueDisplay = document.getElementById(`value_${joint}`);
                if (slider && valueDisplay) {
                    slider.value = 0;
                    valueDisplay.textContent = '0.00';
                }
            });
            
            // Send stop command
            sendJointCommand('emergency_stop', action);
        }
        
        function updateConnectionStatus(connected) {
            isConnected = connected;
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (connected) {
                indicator.className = 'status-indicator status-connected';
                statusText.textContent = '已连接';
                statusText.className = 'badge bg-success fs-6';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                statusText.textContent = '未连接';
                statusText.className = 'badge bg-secondary fs-6';
            }
        }
        
        function updateCurrentPositions(positions) {
            const element = document.getElementById('currentPositions');
            if (positions && Object.keys(positions).length > 0) {
                element.textContent = JSON.stringify(positions, null, 2);
            } else {
                element.textContent = '{\n  "status": "无数据"\n}';
            }
        }
        
        function updateRealTimeStatus(data) {
            updateCurrentPositions(data.positions);
            
            // Update rate calculation
            updateCounter++;
            const now = Date.now();
            if (now - lastUpdateTime >= 1000) {
                const rate = updateCounter;
                document.getElementById('updateRate').textContent = rate + ' Hz';
                updateCounter = 0;
                lastUpdateTime = now;
            }
            
            // Update timestamp
            const timestamp = new Date(data.timestamp * 1000).toLocaleTimeString();
            document.getElementById('lastUpdate').textContent = timestamp;
        }
        
        function logMessage(message) {
            const logArea = document.getElementById('systemLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `[${timestamp}] ${message}`;
            
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
            
            // Keep only last 50 messages
            while (logArea.children.length > 50) {
                logArea.removeChild(logArea.firstChild);
            }
        }
        
        function clearLog() {
            document.getElementById('systemLog').innerHTML = '';
            logMessage('日志已清除');
        }
        
        // Request status updates via WebSocket
        setInterval(function() {
            if (isConnected) {
                socket.emit('request_status');
            }
        }, 100); // 10Hz
        
    </script>
</body>
</html>
